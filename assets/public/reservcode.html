<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisa tu Reserva - Wedding Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spectral+SC:wght@600&family=Spectral:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../css/global.css">
    
    <link rel="stylesheet" href="../../css/media.css">
    <script src="../../js/manager.js" defer></script>
</head>

<body>
    <div id="header-placeholder"></div>
    <header class="hero-selection">
        <div class="hero-selection__top">
            <a href="confirm.html" class="back-btn" aria-label="Atrás">
                <img alt="" src="../images/atras.svg" class="back-btn__icon" aria-hidden="true">
            </a>
            <h1 class="hero-selection__title">Resumen de tu Boda</h1>
        </div>
    </header>

    <main class="confirm-container">
        <div class="confirm-icon">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z"
                    stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>
        <h2 class="confirm-title">REVISA TU RESERVA</h2>
        <p class="confirm-text">
            Para rastrear tu reserva ingresa el código enviado a tu correo personal.
        </p>

        <form id="reserve-code-form" aria-labelledby="reserve-code-form-title">
            <h2 id="reserve-code-form-title" class="visually-hidden">Formulario de código de reserva</h2>
            <div class="code-input-container">
                <label for="reserve-code" class="visually-hidden">Código de reserva</label>
                <input type="text" id="reserve-code" class="code-input" placeholder="Ej. 123456" maxlength="10" autocomplete="off">
            </div>

            <button id="verify-btn" class="btn-verify" type="submit">VERIFICAR</button>
        </form>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const codeInput = document.getElementById('reserve-code');
            const verifyBtn = document.getElementById('verify-btn');
            const reserveCodeForm = document.getElementById('reserve-code-form');

            codeInput.addEventListener('input', () => {
                const value = codeInput.value.trim();
                if (value.length > 0) {
                    verifyBtn.classList.add('active');
                } else {
                    verifyBtn.classList.remove('active');
                }
            });

            reserveCodeForm.addEventListener('submit', (event) => {
                event.preventDefault();
                const code = codeInput.value.trim();
                if (code) {
                    const allReservations = JSON.parse(localStorage.getItem('allReservations') || '[]');
                    // Normalize (remove #WP- if any) and find
                    const found = allReservations.find(r => r.id.replace('#WP-', '') === code.replace('#WP-', ''));

                    if (found) {
                        localStorage.setItem('viewingUserReservation', JSON.stringify(found));
                        window.location.href = 'reserview_user.html';
                    } else {
                        alert('Reserva no encontrada. Por favor verifica el código ingresado.');
                    }
                }
            });
        });
    </script>
    <div id="footer-placeholder"></div>
</body>

</html>
