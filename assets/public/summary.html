<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de tu Boda - Wedding Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Spectral+SC:wght@600&family=Spectral:wght@600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../css/global.css">
    
    <link rel="stylesheet" href="../../css/media.css">
    <script src="../../js/cookie-consent.js" defer></script>
    <script src="../../js/manager.js" defer></script>
</head>

<body>
    <div id="header-placeholder"></div>
    <header class="hero-selection">
        <div class="hero-selection__top">
            <a href="place.html" class="back-btn" aria-label="Atrás" target="_parent">
                <img alt="" src="../images/atras.svg" class="back-btn__icon" aria-hidden="true">
            </a>
            <h1 class="hero-selection__title">RESUMEN DE TU BODA</h1>
        </div>
    </header>

    <main class="summary-content" id="summary-main">
        <div class="summary-marquee" id="dynamic-summary">
            <!-- Dynamic content will be injected here -->
            <div class="empty-cart-message" id="empty-cart">
                Aún no has seleccionado un lugar para tu boda.
            </div>
        </div>
    </main>

    <footer class="summary-pago summary-pago--hidden" id="summary-footer">
        <div class="summary-cart">
            <span class="summary-total-label">Total Incluido</span>
            <span class="summary-total-value" id="final-total">COL$ 0</span>
        </div>
        <span class="summary-footer-note">Revisa los detalles de tu evento antes de continuar con el pago.</span>
        <button class="btn-continue-pay" id="main-action-btn">
            <img src="http://localhost:3845/assets/c5e830f0c676b1d0943f54b17de0ae27122c2907.png" alt="Logo Pago"
                class="btn-continue-pay__logo" id="action-btn-logo">
            <span class="btn-continue-pay__text" id="action-btn-text">FINALIZAR COMPRA</span>
        </button>
    </footer>

    <script src="../../js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.self !== window.top) {
                document.body.classList.add('is-popup');
            }
            renderSummary();
        });

        window.addEventListener('message', (event) => {
            if (event.data.type === 'CART_UPDATED') {
                renderSummary();
            }
        });

        function renderSummary() {
            const cart = getCartData();
            const summaryContainer = document.getElementById('dynamic-summary');
            const footer = document.getElementById('summary-footer');
            const actionBtn = document.getElementById('main-action-btn');
            const actionText = document.getElementById('action-btn-text');
            const actionLogo = document.getElementById('action-btn-logo');

            // Clear current content
            summaryContainer.innerHTML = '';

            // Detect Context (Iframe vs Standalone)
            const isIframe = window.self !== window.top;

            let totalBudget = 0;

            const checkIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="summary-checkmark-icon">
                <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>`;

            function parsePrice(priceStr) {
                if (typeof priceStr === 'number') return priceStr;
                return parseInt(priceStr.replace(/[^0-9]/g, "")) || 0;
            }

            // --- 1. Venue ---
            if (cart.selectedVenue) {
                const venue = cart.selectedVenue;
                totalBudget += parsePrice(venue.price);

                const section = document.createElement('div');
                section.className = 'summary-section';
                section.innerHTML = `
                    <button class="summary-section__remove" title="Eliminar del carrito" data-remove-category="selectedVenue">✕</button>
                    <h2 class="summary-section__title">LUGAR SELECCIONADO</h2>
                    <div class="summary-section__items">
                        <div class="summary-item">
                            <div class="summary-checkmark">${checkIcon}</div>
                            <p class="summary-item__text">${venue.name}</p>
                        </div>
                        <div class="summary-item">
                            <div class="summary-checkmark">${checkIcon}</div>
                            <p class="summary-item__text">${venue.guests}</p>
                        </div>
                    </div>
                    <div class="summary-image-box">
                        <img src="../../${venue.image}" alt="${venue.name}" class="summary-image-box__img">
                    </div>
                `;
                summaryContainer.appendChild(section);
            }

            // Helper for simple categories (Ceremony, Reception, Others)
            function addSimpleCategory(category, title) {
                if (cart[category] && Object.keys(cart[category]).length > 0) {
                    const section = document.createElement('div');
                    section.className = 'summary-section';
                    
                    let itemsHtml = '';
                    Object.values(cart[category]).forEach(item => {
                        totalBudget += parsePrice(item.price);
                        itemsHtml += `
                            <div class="summary-item">
                                <div class="summary-checkmark">${checkIcon}</div>
                                <p class="summary-item__text">${item.name} - ${item.price}</p>
                            </div>
                        `;
                    });

                    section.innerHTML = `
                        <button class="summary-section__remove" title="Eliminar sección" data-remove-category="${category}">✕</button>
                        <h2 class="summary-section__title">${title}</h2>
                        <div class="summary-section__items">${itemsHtml}</div>
                    `;
                    summaryContainer.appendChild(section);
                }
            }

            addSimpleCategory('ceremony', 'CEREMONIA');
            addSimpleCategory('reception', 'RECEPCIÓN');
            addSimpleCategory('others', 'OTROS SERVICIOS');

            // --- Food Category (Special handling for quantity/guests) ---
            if (cart.food && Object.keys(cart.food).length > 0) {
                const section = document.createElement('div');
                section.className = 'summary-section';
                
                let itemsHtml = '';
                const guestCount = parseInt(localStorage.getItem('selectedGuests')) || 0;

                Object.values(cart.food).forEach(item => {
                    let itemTotal = 0;
                    let detailLine = '';
                    
                    if (item.mode === 'add') {
                        itemTotal = parsePrice(item.unitPrice) * item.quantity;
                        detailLine = `${item.quantity} unidades`;
                    } else {
                        itemTotal = parsePrice(item.unitPrice) * guestCount;
                        detailLine = `${guestCount} platos`;
                    }
                    
                    totalBudget += itemTotal;
                    itemsHtml += `
                        <div class="summary-item">
                            <div class="summary-checkmark">${checkIcon}</div>
                            <div class="summary-item__content">
                                <p class="summary-item__text">${item.name}</p>
                                <p class="summary-item__subtext">${detailLine} - COL$ ${itemTotal.toLocaleString('es-CO')}</p>
                            </div>
                        </div>
                    `;
                });

                section.innerHTML = `
                    <button class="summary-section__remove" title="Eliminar sección" data-remove-category="food">✕</button>
                    <h2 class="summary-section__title">COMIDA</h2>
                    <div class="summary-section__items">${itemsHtml}</div>
                `;
                summaryContainer.appendChild(section);
            }

            // Update Total and Footer Visibility
            if (totalBudget > 0) {
                footer.classList.remove('summary-pago--hidden');
                document.getElementById('final-total').textContent = 'COL$ ' + totalBudget.toLocaleString('es-CO');
                
                // Validation LOGIC
                const storedDate = localStorage.getItem('selectedWeddingDate');
                if (!storedDate && isIframe) {
                    actionText.textContent = 'SELECCIONA UNA FECHA';
                    actionBtn.style.opacity = '0.7';
                    actionBtn.style.cursor = 'not-allowed';
                    actionBtn.onclick = (e) => {
                        e.preventDefault();
                        alert('Para confirmar disponibilidad debe seleccionar la fecha aproximada de la boda en el inicio.');
                        return false;
                    };
                    
                    const warning = document.createElement('p');
                    warning.className = 'summary-warning';
                    warning.textContent = "Para confirmar disponibilidad debe seleccionar la fecha aproximada de la boda en la página principal";
                    summaryContainer.appendChild(warning);
                } else {
                    actionBtn.style.opacity = '1';
                    actionBtn.style.cursor = 'pointer';
                    if (isIframe) {
                        actionText.textContent = 'FINALIZAR COMPRA';
                        actionLogo.style.display = 'none';
                        actionBtn.onclick = () => window.open('summary.html', '_blank');
                    } else {
                        actionText.textContent = 'CONTINUAR COMPRA';
                        actionLogo.style.display = 'inline-block';
                        actionBtn.onclick = () => { window.location.href = 'payment.html'; };
                    }
                }
            } else {
                summaryContainer.innerHTML = `<div class="empty-cart-message">Aún no has seleccionado nada para tu boda.</div>`;
                footer.classList.add('summary-pago--hidden');
            }
        }

        function handleRemove(category) {
            showCustomConfirm(
                '¿ELIMINAR SELECCIÓN?',
                '¿Estás seguro de que deseas eliminar este lugar de tu selección?',
                () => {
                    removeFromCart(category);
                    renderSummary();
                    window.parent.postMessage({ type: 'CART_UPDATED' }, '*');
                }
            );
        }



        document.addEventListener('DOMContentLoaded', () => {
            const summaryContainer = document.getElementById('dynamic-summary');
            if (!summaryContainer) {
                return;
            }

            summaryContainer.addEventListener('click', (event) => {
                const removeBtn = event.target.closest('.summary-section__remove[data-remove-category]');
                if (!removeBtn) {
                    return;
                }

                handleRemove(removeBtn.dataset.removeCategory);
            });
        });
    </script>
    <div id="footer-placeholder"></div>
</body>

</html>
