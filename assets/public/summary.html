<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de tu Boda - Wedding Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Spectral+SC:wght@600&family=Spectral:wght@600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/summary.css">
</head>

<body>
    <header class="hero-selection">
        <div class="hero-selection__top">
            <a href="/assets/public/place.html" class="back-btn" target="_parent">
                <img src="/assets/images/atras.svg" alt="Atrás" width="54">
            </a>
            <h1 class="hero-selection__title">RESUMEN DE TU BODA</h1>
        </div>
    </header>

    <main class="summary-content" id="summary-main">
        <div class="summary-marquee" id="dynamic-summary">
            <!-- Dynamic content will be injected here -->
            <div class="empty-cart-message" id="empty-cart">
                Aún no has seleccionado un lugar para tu boda.
            </div>
        </div>
    </main>

    <footer class="summary-pago" id="summary-footer" style="display:none;">
        <div class="summary-cart">
            <span class="summary-total-label">Total Incluido</span>
            <span class="summary-total-value" id="final-total">COL$ 0</span>
        </div>
        <span class="summary-footer-note">Revisa los detalles de tu evento antes de continuar con el pago.</span>
        <button class="btn-continue-pay" id="main-action-btn">
            <img src="http://localhost:3845/assets/c5e830f0c676b1d0943f54b17de0ae27122c2907.png" alt="Logo Pago"
                class="btn-continue-pay__logo" id="action-btn-logo">
            <span class="btn-continue-pay__text" id="action-btn-text">FINALIZAR COMPRA</span>
        </button>
    </footer>

    <script src="/js/cart.js"></script>
    <script>
        function renderSummary() {
            const cart = getCartData();
            const summaryContainer = document.getElementById('dynamic-summary');
            const footer = document.getElementById('summary-footer');
            const actionBtn = document.getElementById('main-action-btn');
            const actionText = document.getElementById('action-btn-text');
            const actionLogo = document.getElementById('action-btn-logo');

            // Clear current content
            summaryContainer.innerHTML = '';
            
            // Detect Context (Iframe vs Standalone)
            const isIframe = window.self !== window.top;

            if (cart.selectedVenue) {
                const venue = cart.selectedVenue;

                const section = document.createElement('div');
                section.className = 'summary-section';

                const checkIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="color: #000; margin-top: 4px;">
                    <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>`;

                section.innerHTML = `
                    <button class="summary-section__remove" title="Eliminar del carrito" onclick="handleRemove('selectedVenue')">
                       ✕
                    </button>
                    <h2 class="summary-section__title">LUGAR SELECCIONADO</h2>
                    <div class="summary-section__items">
                        <div class="summary-item">
                            <div class="summary-checkmark">${checkIcon}</div>
                            <p class="summary-item__text">${venue.name}</p>
                        </div>
                        <div class="summary-item">
                            <div class="summary-checkmark">${checkIcon}</div>
                            <p class="summary-item__text">${venue.guests}</p>
                        </div>
                        <div class="summary-item">
                            <div class="summary-checkmark">${checkIcon}</div>
                            <p class="summary-item__text">Uso exclusivo del lugar</p>
                        </div>
                    </div>
                    <div class="summary-image-box">
                        <img src="${venue.image}" alt="${venue.name}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                `;

                summaryContainer.appendChild(section);
                footer.style.display = 'flex';
                document.getElementById('final-total').textContent = venue.price;

                // Validation LOGIC
                const storedDate = localStorage.getItem('selectedWeddingDate');
                if (!storedDate && isIframe) {
                    actionText.textContent = 'SELECCIONA UNA FECHA';
                    actionBtn.style.opacity = '0.7';
                    actionBtn.style.cursor = 'not-allowed';
                    actionBtn.onclick = (e) => {
                        e.preventDefault();
                        alert('Para confirmar disponibilidad debe seleccionar la fecha aproximada de la boda en el inicio.');
                        return false;
                    };
                    
                    // Add warning text before footer
                    const warning = document.createElement('p');
                    warning.style.cssText = "grid-column: 1/-1; text-align: center; color: #ff4444; font-family: 'Spectral', serif; font-size: 16px; margin-top: 20px;";
                    warning.textContent = "Para confirmar disponibilidad debe seleccionar la fecha aproximada de la boda en la página principal";
                    summaryContainer.appendChild(warning);
                } else {
                    actionBtn.style.opacity = '1';
                    actionBtn.style.cursor = 'pointer';
                    if (isIframe) {
                        actionText.textContent = 'FINALIZAR COMPRA';
                        actionLogo.style.display = 'none'; 
                        actionBtn.onclick = () => window.open('/assets/public/summary.html', '_blank');
                    } else {
                        actionText.textContent = 'CONTINUAR COMPRA';
                        actionLogo.style.display = 'inline-block';
                        actionBtn.onclick = () => { window.location.href = '/assets/public/userdata.html'; };
                    }
                }
            } else {
                summaryContainer.innerHTML = `<div class="empty-cart-message">Aún no has seleccionado un lugar para tu boda.</div>`;
                footer.style.display = 'none';
            }
        }

        function handleRemove(category) {
            showCustomConfirm(
                '¿ELIMINAR SELECCIÓN?', 
                '¿Estás seguro de que deseas eliminar este lugar de tu selección?',
                () => {
                    removeFromCart(category);
                    renderSummary();
                    window.parent.postMessage({ type: 'CART_UPDATED' }, '*');
                }
            );
        }

        document.addEventListener('DOMContentLoaded', renderSummary);
    </script>
</body>

</html>
