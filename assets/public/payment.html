<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Spectral+SC:wght@600&family=Spectral:wght@600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    
    <link rel="stylesheet" href="/css/media.css">
    <script src="/js/manager.js" defer></script>
</head>

<body>
    <div id="header-placeholder"></div>
    <header class="hero-selection">
        <div class="hero-selection__top">
            <a href="/assets/public/others.html" class="back-btn" aria-label="Atrás">
                <img alt="" src="/assets/images/atras.svg" class="back-btn__icon" aria-hidden="true">
            </a>
            <h1 class="hero-selection__title">PAGO</h1>
        </div>
    </header>

    <main class="userdata-content">
        <form class="userdata-form" aria-labelledby="payment-form-legend">
            <fieldset class="form-grid">
                <legend id="payment-form-legend" class="visually-hidden">Datos de contacto y reserva</legend>
                <div class="form-group">
                    <label for="groom-name">Nombre del Novio</label>
                    <input type="text" id="groom-name" autocomplete="name" placeholder="Ej. Juan Pérez">
                </div>
                <div class="form-group">
                    <label for="bride-name">Nombre de la Novia</label>
                    <input type="text" id="bride-name" autocomplete="name" placeholder="Ej. María García">
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" autocomplete="email" placeholder="email@ejemplo.com">
                    <p class="form-error-text" id="email-error">correo no valido</p>
                </div>
                <div class="form-group">
                    <label for="phone">Teléfono de Contacto</label>
                    <input type="tel" id="phone" autocomplete="tel" placeholder="+57 300 000 0000">
                    <p class="form-error-text" id="phone-error">caracter invalido</p>
                </div>
                <div class="form-group">
                    <label for="wedding-date">Fecha tentativa de la boda</label>
                    <input type="date" id="wedding-date" readonly>
                    <p class="form-help-text">Para editar fecha revise nuevamente el inicio por disponibilidad</p>
                </div>
                <div class="form-group">
                    <label for="deposit">Abono de la Reserva</label>
                    <input type="text" id="deposit" placeholder="Mínimo 50%">
                </div>
                <div class="form-group full-width">
                    <label for="comments">¿Tienes algún requerimiento especial?</label>
                    <input type="text" id="comments"
                        placeholder="Ej. Necesitamos acceso para personas con movilidad reducida">
                </div>
            </fieldset>
        </form>
    </main>

    <footer class="summary-pago">
        <div class="summary-cart">
            <span class="summary-total-label">Costo Total</span>
            <span class="summary-total-value" id="final-total">COL$ 0</span>
        </div>
        <span class="summary-footer-note">Procesaremos tu pago por medio de Mercado Pago.</span>
        <a class="btn-pay-mp" id="btn-pay-mp" href="/assets/public/confirm.html" role="button">
            <span class="btn-pay-mp__logo-wrap">
                <img src="https://www.figma.com/api/mcp/asset/41f437b8-ae3f-4d7e-9d0c-be0514b06765" alt="Logo de Mercado Pago">
            </span>
            <span>Ir a pagar</span>
        </a>
    </footer>

    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('wedding-date');
            const storedDate = localStorage.getItem('selectedWeddingDate');
            if (dateInput && storedDate) {
                dateInput.value = storedDate;
            }

            const payBtn = document.getElementById('btn-pay-mp');
            if (payBtn) {
                payBtn.addEventListener('click', (e) => {
                    const requiredFieldIds = ['groom-name', 'bride-name', 'email', 'phone', 'wedding-date', 'deposit'];
                    let isComplete = true;
                    let hasInvalidFormat = false;

                    // Reset previous validation states
                    requiredFieldIds.forEach(id => {
                        const input = document.getElementById(id);
                        if (input) input.classList.remove('field--invalid');
                    });
                    
                    // Specific error message reset
                    const emailError = document.getElementById('email-error');
                    const phoneError = document.getElementById('phone-error');
                    if (emailError) emailError.style.display = 'none';
                    if (phoneError) phoneError.style.display = 'none';

                    for (const id of requiredFieldIds) {
                        const input = document.getElementById(id);
                        if (!input) continue;

                        const value = input.value.trim();
                        
                        // 1. Check if empty
                        if (!value) {
                            isComplete = false;
                            input.classList.add('field--invalid');
                        } else {
                            // 2. Format validation
                            if (id === 'email' && !value.includes('@')) {
                                hasInvalidFormat = true;
                                input.classList.add('field--invalid');
                                if (emailError) emailError.style.display = 'block';
                            }
                            if (id === 'phone' && !/^\d+$/.test(value)) {
                                hasInvalidFormat = true;
                                input.classList.add('field--invalid');
                                if (phoneError) phoneError.style.display = 'block';
                            }
                        }
                    }

                    if (!isComplete) {
                        e.preventDefault();
                        if (typeof showCustomAlert === 'function') {
                            showCustomAlert('informacion incometa', 'llena los datos para continuar con el pago');
                        } else {
                            alert('informacion incometa. llena los datos para continuar con el pago');
                        }
                    } else if (hasInvalidFormat) {
                        e.preventDefault();
                        if (typeof showCustomAlert === 'function') {
                            showCustomAlert('datos invalidos', 'revisa que el correo tenga @ y el telefono sea solo numeros');
                        } else {
                            alert('formato incorrecto. Revisa el correo y el teléfono');
                        }
                    }
                });
            }
        });
    </script>
</body>

</html>
