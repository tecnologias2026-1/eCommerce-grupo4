<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos de Reserva - Wedding Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Spectral+SC:wght@600&family=Spectral:wght@600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/summary.css">
    <link rel="stylesheet" href="/css/userdata.css">
</head>

<body>
    <header class="hero-selection">
        <div class="hero-selection__top">
            <a href="/assets/public/summary.html" class="back-btn">
                <img src="/assets/images/atras.svg" alt="Atrás" width="54">
            </a>
            <h1 class="hero-selection__title">DATOS RESERVA</h1>
        </div>
    </header>

    <main class="userdata-content">
        <div class="userdata-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="groom-name">Nombre del Novio</label>
                    <input type="text" id="groom-name" placeholder="Ej. Juan Pérez">
                </div>
                <div class="form-group">
                    <label for="bride-name">Nombre de la Novia</label>
                    <input type="text" id="bride-name" placeholder="Ej. María García">
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="email@ejemplo.com">
                </div>
                <div class="form-group">
                    <label for="phone">Teléfono de Contacto</label>
                    <input type="tel" id="phone" placeholder="+57 300 000 0000">
                </div>
                <div class="form-group">
                    <label for="wedding-date">Fecha tentativa de la boda</label>
                    <input type="date" id="wedding-date" readonly>
                    <p class="form-help-text">Para editar fecha revise nuevamente el inicio por disponibilidad</p>
                </div>
                <div class="form-group">
                    <label for="deposit">Abono de la Reserva</label>
                    <input type="text" id="deposit" placeholder="Mínimo 50%">
                </div>
                <div class="form-group full-width">
                    <label for="comments">¿Tienes algún requerimiento especial?</label>
                    <input type="text" id="comments" placeholder="Ej. Necesitamos acceso para personas con movilidad reducida">
                </div>
            </div>
        </div>
    </main>

    <footer class="summary-pago">
        <div class="summary-cart">
            <span class="summary-total-label">Costo Total</span>
            <span class="summary-total-value" id="final-total">COL$ 0</span>
        </div>
        <span class="summary-footer-note">Procesaremos tu pago por medio de Mercado Pago.</span>
        <button class="btn-submit-booking">ACEPTAR DATOS</button>
    </footer>

    <script src="/js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const storedDate = localStorage.getItem('selectedWeddingDate');
            const dateInput = document.getElementById('wedding-date');
            if (storedDate && dateInput) {
                dateInput.value = storedDate;
            }

            // Populate total
            const cart = getCartData();
            if (cart.selectedVenue) {
                document.getElementById('final-total').textContent = cart.selectedVenue.price;
            }

            // Handle submission
            const submitBtn = document.querySelector('.btn-submit-booking');
            if (submitBtn) {
                submitBtn.onclick = () => {
                    const inputs = {
                        groom: document.getElementById('groom-name').value.trim(),
                        bride: document.getElementById('bride-name').value.trim(),
                        email: document.getElementById('email').value.trim(),
                        phone: document.getElementById('phone').value.trim(),
                        deposit: document.getElementById('deposit').value.trim(),
                        comments: document.getElementById('comments').value.trim()
                    };

                    // Check if any field is empty
                    const emptyFields = Object.values(inputs).some(val => val === "");
                    
                    if (emptyFields) {
                        showCustomAlert('DATOS INCOMPLETOS', 'Por favor, completa todos los campos de información para procesar tu reserva.');
                        return;
                    }

                    // SUCCESS: Guardar reserva
                    const cart = getCartData();
                    const newReservation = {
                        id: `#WP-${Math.floor(1000 + Math.random() * 9000)}`,
                        groom: inputs.groom,
                        bride: inputs.bride,
                        email: inputs.email,
                        phone: inputs.phone,
                        weddingDate: document.getElementById('wedding-date').value,
                        venue: cart.selectedVenue ? cart.selectedVenue.name : 'N/A',
                        venueImage: cart.selectedVenue ? cart.selectedVenue.image : '',
                        status: 'Pendiente',
                        timestamp: new Date().toISOString()
                    };

                    const allReservations = JSON.parse(localStorage.getItem('allReservations') || '[]');
                    allReservations.push(newReservation);
                    localStorage.setItem('allReservations', JSON.stringify(allReservations));

                    // Success: Redirect
                    window.location.href = '/assets/public/confirm.html';
                };
            }
        });
    </script>
</body>

</html>
