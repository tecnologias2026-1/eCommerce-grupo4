<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sede - Hacienda San Juan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@500&family=Spectral+SC:wght@600&family=Spectral:wght@600;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/venue.css" />
</head>

<body class="venue-body">
    <venue-header title="Hacienda San Juan" price="COL$ 6.500.000" guests="300 invitados">
    </venue-header>

    <main class="venue-content">
        <venue-video src="/assets/videos/venue3-placeholder.mp4"></venue-video>

        <section class="venue-features-grid">
            <venue-card img-src="https://www.figma.com/api/mcp/asset/5ce17c14b85c0230ad826175988c2abb9f18c99e"
                title="Plaza Central">
            </venue-card>
            <venue-card img-src="https://www.figma.com/api/mcp/asset/e36695221e253936f8bde9d164e5896ae70537c9"
                title="Zona de Ceremonia">
            </venue-card>
            <venue-card img-src="https://www.figma.com/api/mcp/asset/2ecf4a4522e12a1c21f86365daf37687271f8bf8"
                title="Pista de Baile">
            </venue-card>
            <venue-card img-src="https://www.figma.com/api/mcp/asset/7358a739dc6f4f68f6b2ac07946088eba7878ae6"
                title="Salón de Eventos">
            </venue-card>
        </section>

        <!-- Contenido específico de esta sede -->
    </main>

    <script src="/js/venue-component.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const guestsSelection = localStorage.getItem('selectedGuests');
            const venueHeader = document.querySelector('venue-header');

            const originalPriceStr = venueHeader.getAttribute('price');
            const originalGuestsStr = venueHeader.getAttribute('guests');

            const basePriceNum = parseInt(originalPriceStr.replace(/[^0-9]/g, "")) || 0;
            const baseGuestsNum = parseInt(originalGuestsStr.replace(/[^0-9]/g, "")) || 100;

            const selectedGuests = (guestsSelection && parseInt(guestsSelection) > 0)
                ? parseInt(guestsSelection)
                : baseGuestsNum;

            const pricePerGuest = basePriceNum / baseGuestsNum;
            const total = pricePerGuest * selectedGuests;

            const extraGuests = Math.max(0, selectedGuests - baseGuestsNum);
            const extraCost = extraGuests * pricePerGuest;

            const finalGuestsEl = document.getElementById('final-guest-count');
            const baseRentEl = document.getElementById('base-rent');
            const projectedTotalEl = document.getElementById('projected-total');
            const extraInfoEl = document.getElementById('extra-guests-info');

            if (finalGuestsEl) finalGuestsEl.textContent = selectedGuests;
            if (baseRentEl) baseRentEl.textContent = 'COL$ ' + basePriceNum.toLocaleString('es-CO');
            if (projectedTotalEl) projectedTotalEl.textContent = 'COL$ ' + Math.round(total).toLocaleString('es-CO');

            if (extraInfoEl) {
                if (extraGuests > 0) {
                    extraInfoEl.textContent = `+ ${extraGuests} invitados adicionales (+ COL$ ${Math.round(extraCost).toLocaleString('es-CO')})`;
                } else {
                    extraInfoEl.textContent = "Capacidad base";
                }
            }
        });
    </script>

</body>

</html>
