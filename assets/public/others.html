          <div class="feature" data-name="Feature 2" data-node-id="I475:1097;475:2040">

    <section class="row-characteristic selection-item" data-id="musica" data-name="Música y DJ" data-price="1500000">
      <div class="row-characteristic__text">
        <h2 class="row-characteristic__title">Música y DJ</h2>

          Sonido profesional, iluminación para la pista de baile y DJ experto en bodas.
        </p>
      </div>
      <div class="row-characteristic__image">

    <section class="next-button-bar">
      <a href="payment.html" class="btn-primary">
        <span class="btn-primary__text">Continuar</span>
      </a>
    </section>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const items = document.querySelectorAll('.selection-item');
        const cart = JSON.parse(localStorage.getItem('weddingCart') || '{}');
        const selections = cart.others || {};
        
        items.forEach(item => {
          if (selections[item.dataset.id]) {
            item.classList.add('is-selected');
          }

          item.addEventListener('click', () => {
            const isSelected = item.classList.toggle('is-selected');
            updateCart(item, isSelected);
          });
        });

        function updateCart(item, isSelected) {
          const currentCart = JSON.parse(localStorage.getItem('weddingCart') || '{}');
          if (!currentCart.others) currentCart.others = {};

          if (isSelected) {
            const name = item.dataset.name;
            currentCart.others[item.dataset.id] = {
              id: item.dataset.id,
              name: name,
              price: item.querySelector('.row-characteristic__price-main').textContent
            };
            showCustomAlert('¡ENHORABUENA!', `Has agregado "${name}" a tu boda.`);
            
            // Abrir el resumen automáticamente
            setTimeout(() => {
                showSummaryPopup();
            }, 500);
          } else {
            delete currentCart.others[item.dataset.id];
          }

          localStorage.setItem('weddingCart', JSON.stringify(currentCart));
          window.postMessage({ type: 'CART_UPDATED' }, '*');

          // Forzar actualización si el resumen ya está abierto
          const summaryBackdrop = document.querySelector(".summary-modal-backdrop");
          if (summaryBackdrop) {
              const iframe = summaryBackdrop.querySelector('iframe');
              if (iframe && iframe.contentWindow) {
                  iframe.contentWindow.postMessage({ type: 'CART_UPDATED' }, '*');
              }
          }
        }
      });
    </script>
    </main>
    <div id="footer-placeholder"></div>
  </body>
